spring:
  application:
    name: ConnectHub
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${DB_URL}
    username: ${DB_USERNAME_POSTGRES}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 100
      minimum-idle: 20
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      leak-detection-threshold: 60000
  data:
    redis:
#          url: ${REDIS_URL}
          username: ${REDIS_USERNAME}
          password: ${REDIS_PASSWORD}
          host: ${REDIS_HOST}
          port: ${REDIS_PORT}
          timeout: 3000ms
  threads:
    virtual:
      enabled: true          
server:
  port: ${SERVER_PORT:10000}
management:
  endpoints:
    web:
      exposure:
        include: health,info  # Cho Render health check
#rsa:
#  public-key: classpath:keys/public.pem
#  private-key: classpath:keys/private.pem
rsa:
  public-key: ${RSA_PUBLIC_KEY}
  private-key: ${RSA_PRIVATE_KEY}

refresh-token:
  key: ${REFRESH_TOKEN_KEY_PREFIX}
bucket4j:
  enabled: true
  default-http-status-code: TOO_MANY_REQUESTS # HTTP 429
  default-http-content-type: application/json;charset=UTF-8
  # Bọc chuỗi JSON bằng dấu nháy đơn để tránh lỗi Parser của Spring YML
  default-http-response-body: '{"status": 429, "error": "Too Many Requests", "message": "Bạn thao tác quá nhanh, vui lòng chờ trong giây lát trước khi thử lại."}'

  filters:
    - cache-name: rate-limit-buckets
      filter-method: servlet
      filter-order: -100
      url: ^/api/auth/.*
      rate-limits:
        - cache-key: "getRemoteAddr()"
          bandwidths:
            - capacity: 10
              time: 1
              unit: minutes

    - cache-name: rate-limit-buckets
      filter-method: servlet
      filter-order: -99
      url: ^/api/.*
      rate-limits:
        - skip-condition: "getRequestURI().startsWith('/api/auth/')"
          cache-key: "getHeader('Authorization') != null ? getHeader('Authorization') : getRemoteAddr()"
          bandwidths:
            - capacity: 150
              time: 1
              unit: minutes
            - capacity: 5
              time: 1
              unit: seconds
app:
  cors:

    allowed-origins: "${CORS_ALLOWED_ORIGINS}"
